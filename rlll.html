<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vividshe Reels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        /* Body styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #031716, #032f30, #0a7075, #0c969c, #6ba3be, #274d60);
            color: #ffffff;
            text-align: center;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background-color: rgba(3, 23, 22, 0.8);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .nav-icons {
            display: none; /* Remove arrows and navigation icons */
        }

        /* Reels container */
        .reels-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            overflow-y: scroll;
        }

        .reel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; /* Ensures one video fits the screen */
            position: relative;
            overflow: hidden; /* Ensures video is contained within the container */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the container */
            border-radius: 8px;
        }

        /* Action icons */
        .action-icons {
            position: absolute;
            bottom: 20px;
            right: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .action-icons i {
            font-size: 24px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
        }

        .action-icons i:hover {
            background: rgba(106, 163, 190, 0.8);
            transform: scale(1.2);
        }

        .action-icons span {
            margin-top: 5px;
            font-size: 12px;
            color: #ffffff;
        }

        /* Like button active state */
        .play-pause {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: transparent;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            z-index: 2;
        }

        .play-pause:focus {
            outline: none;
        }

        /* Like, Save, and Chat buttons */
        .profile{
            color: white;
            padding-right:250px;
            font-size:0.5rem;
        }
        


    </style>
</head>
<body>

<div class="reels-container" id="reels-container">
    <div class="reel">
        <a href="cprofile.html" class="profile">@EmilyGrace_18</a>
        <video id="video1" controls autoplay>
            <source src="berklee college.mp4" type="video/mp4">
         
        </video>
        
    </div>
    <div class="reel">
        <a href="profile1.html" class="profile">@Akriti_Sharma12</a>
        <video id="video3"controls autoplay>
            
            <source src="dance.mp4" type="video/mp4">
        </video>
    </div>

    <div class="reel">
        <video id="video2" controls autoplay>
            <source src="fashionDesigning.mp4" type="video/mp4">
        </video>
    </div>
    <div class="reel">
        <video id="video4" controls autoplay>
            <source src="artist.mp4" type="video/mp4">
        </video>
    </div>
    <div class="reel">
        <video id="video5" controls autoplay>
            <source src="raisinart.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
    // Function to handle play/pause when video is in view
    const reels = document.querySelectorAll('video');

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.play();  // Play video when in view
        } else {
            entry.target.pause();  // Pause video when out of view
        }
    });
}, { threshold: 0.5 }); // Play video when it's at least 50% in view

reels.forEach(reel => {
    observer.observe(reel);
});

    // Initially check visibility of videos on page load
    window.addEventListener('load', checkVideos);

    function toggleLike(button) {
            button.classList.toggle('liked');
            var heartIcon = button.querySelector('i');
            if (button.classList.contains('liked')) {
                heartIcon.classList.remove('bi-heart');
                heartIcon.classList.add('bi-heart-fill');
            } else {
                heartIcon.classList.remove('bi-heart-fill');
                heartIcon.classList.add('bi-heart');
            }
        }

        function toggleSave(button) {
            button.classList.toggle('saved');
            var saveIcon = button.querySelector('i');
            if (button.classList.contains('saved')) {
                saveIcon.classList.remove('bi-bookmark');
                saveIcon.classList.add('bi-bookmark-fill');
            } else {
                saveIcon.classList.remove('bi-bookmark-fill');
                saveIcon.classList.add('bi-bookmark');
            }
        }
</script>

</body>
</html>
