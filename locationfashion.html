<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Redirect</title>
    <style>
        /* General reset for margin and padding */
        body, h1, p {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            /* Applying the linear gradient as background */
            background:linear-gradient(to bottom, #031716, #032f30, #0a7075, #0c969c, #6ba3be, #274d60); /* Gradient background */;
            padding: 20px;
            text-align: center;  /* Center all the content */
        }

        h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 20px;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 3rem;
        }

        img {
            width: 400px;
            height: 350px;
            margin-bottom: 20px;
            border-radius: 8px; /* Rounded corners for the image */
        }

        /* Paragraph styling */
        p {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 20px;
        }

        /* Button Style for the link */
        a {
            display: inline-block;
            background-color:#032f30;
            color: white;
            font-size: 18px;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

    </style>
</head>
<body>
    <h1>About Us</h1>
    <img src="./fashionDesigning.jpg" width="300" height="350" alt="DanceClassPoster"/>

    <h1>Direction to Our Location</h1>
    <p>Click the button below to get directions from your current location to the given address:</p>
    
    <!-- Link to Google Maps with the updated address -->
    <a href="https://www.google.com/maps/dir/?api=1&destination=Infront+of+Bus+Stop%2C+E-8%2F3+First+Floor%2C+Pahal+Design%2C+near+Gate+No+2%2C+Basant+Kunj%2C+Arera+Colony%2C+Bhopal%2C+Madhya+Pradesh+462039" target="_blank">Click Here</a>
</body>
</html>
